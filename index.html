<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI FAQ Chatbot</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="chat-container">
<header><h2>🤖 AI & Programming FAQ Chatbot</h2><button id="clearBtn">Clear Chat</button></header>
<div id="chatBox" class="chat-box"></div>
<div class="suggestions">
<button class="suggestion">What is AI?</button>
<button class="suggestion">Explain Python</button>
<button class="suggestion">What is Machine Learning?</button>
</div>
<div class="input-area">
<input id="userInput" placeholder="Ask a question...">
<button id="sendBtn">Send</button>
</div>
</div>
<script src="script.js"></script>
</body></html>
